version: "3.9"

services:
  db:
    image: postgres:18
    container_name: sensor_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresPW
      POSTGRES_DB: sensordb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sensordb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sensor_api
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sensordb
    ports:
      - "8000:8000"
    env_file:
      - .env

volumes:
  postgres_data: