name: Humidity Threshold Alert
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Hourly humidity alert check
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python humidity_check.py