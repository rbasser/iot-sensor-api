name: Humidity Threshold Alert
on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch:
    
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Hourly humidity alert check
        run: python humidity_check.py