name: Data Gap Alert

on:
  schedule:
    - cron: '*/15 * * * *'  # every 10 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check for data gap
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python gap_check.py