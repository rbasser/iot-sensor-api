name: Daily Sensor Data Aggregation
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger API Aggregation Route
        run: |
          curl -X POST "https://iot-ingestion-api.onrender.com/sync/daily" \
          -H "X-API-Key: ${{ secrets.API_KEY }}"