name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t weather-station-api .

      - name: Run CRUD tests
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY }} \
            weather-station-api \
            pytest tests/test_crud.py -v --tb=short

      - name: Run history tests
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY }} \
            weather-station-api \
            pytest tests/test_history.py -v --tb=short

      - name: Run sync tests
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY }} \
            weather-station-api \
            pytest tests/test_sync.py -v --tb=short

      - name: Run Pico tests
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY }} \
            weather-station-api \
            pytest tests/test_pico.py -v --tb=short

      - name: Run dashboard tests
        run: |
          docker run --rm \
            -e API_KEY=${{ secrets.API_KEY }} \
            weather-station-api \
            pytest tests/test_dashboard.py -v --tb=short

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"