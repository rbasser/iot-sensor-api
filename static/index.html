<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://raw.githubusercontent.com/rbasser/iot-sensor-api/main/static/SensorData.png" type="image/png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f7f7f5;
            --surface:   #ffffff;
            --border:    #e8e8e4;
            --text:      #1a1a18;
            --muted:     #888880;
            --temp:      #d94f3d;
            --temp-bg:   rgba(217, 79, 61, 0.07);
            --hum:       #3b82c4;
            --hum-bg:    rgba(59, 130, 196, 0.07);
            --online:    #3db86a;
            --offline:   #d94f3d;
            --radius:    12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-block h1 {
            font-family: 'DM Mono', monospace;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .title-block p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
            font-family: 'DM Mono', monospace;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }

        .status-dot.online  { background: var(--online);  box-shadow: 0 0 0 3px rgba(61,184,106,0.2); }
        .status-dot.offline { background: var(--offline); box-shadow: 0 0 0 3px rgba(217,79,61,0.2); }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-dot.loading {
            width: 12px;
            height: 12px;
            background: transparent !important;
            border: 2px solid var(--border);
            border-top-color: var(--muted);
            box-shadow: none !important;
            animation: spin 0.6s linear infinite;
        }

        /* ── Stat Cards ── */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.4s ease forwards;
        }

        .stat-card:nth-child(2) { animation-delay: 0.07s; }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card.temp::before { background: var(--temp-bg); }
        .stat-card.hum::before  { background: var(--hum-bg); }
        .stat-card:hover::before { opacity: 1; }

        .stat-label {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.03em;
            transition: color 0.3s;
        }

        .stat-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-ago {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--muted);
        }

        .stat-card.temp .stat-value { color: var(--temp); }
        .stat-card.hum  .stat-value { color: var(--hum); }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.4s ease 0.14s forwards;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap; 
            gap: 12px;
        }

        .card-header-group {
            display: flex; 
            align-items: center; 
            gap: 10px;
            flex-wrap: wrap;
        }

        .card-title {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .legend { display: flex; gap: 16px; }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.72rem; font-family: 'DM Mono', monospace; color: var(--muted);
        }
        .legend-line { width: 18px; height: 2px; border-radius: 2px; }

        .btn-window, .btn-range {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            padding: 4px 12px; font-family: 'DM Mono', monospace; font-size: 0.68rem;
            color: var(--muted); cursor: pointer; white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        
        .btn-range { padding: 3px 10px; }
        .btn-window { display: none; }
        .btn-window.visible { display: inline-block; }
        
        .btn-window:hover, .btn-range:hover { border-color: var(--text); color: var(--text); }
        .btn-range.active, .btn-window.active { background: var(--text); border-color: var(--text); color: var(--surface); }
        
        .btn-reset {
            background: var(--temp-bg); border: 1px solid var(--temp); color: var(--temp);
            border-radius: 6px; padding: 4px 12px; font-family: 'DM Mono', monospace;
            font-size: 0.68rem; cursor: pointer; display: none; transition: all 0.2s;
        }
        .btn-reset:hover { background: var(--temp); color: var(--surface); }

        .chart-wrap { position: relative; height: 300px; }
        .no-data {
            position: absolute; inset: 0; display: none; align-items: center;
            justify-content: center; font-family: 'DM Mono', monospace;
            font-size: 0.82rem; color: var(--muted);
        }

        /* ── Summary Table ── */
        .table-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px 28px; opacity: 0; animation: fadeUp 0.4s ease 0.21s forwards;
        }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 4px; min-width: 450px; }

        thead th {
            font-size: 0.68rem; font-family: 'DM Mono', monospace; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--muted); padding: 0 0 12px; text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tbody td { padding: 13px 0; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--bg); }

        .cell-temp { color: var(--temp); font-family: 'DM Mono', monospace; }
        .cell-hum  { color: var(--hum);  font-family: 'DM Mono', monospace; }
        .cell-mono { font-family: 'DM Mono', monospace; color: var(--text); }
        .empty-row td { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.82rem; padding: 20px 0; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .table-loading { animation: pulse 1.5s ease-in-out infinite; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.82rem; padding: 20px 0; text-align: center; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 520px) {
            .stats { grid-template-columns: 1fr; }
            .stat-value { font-size: 2.2rem; }
            body { padding: 20px 16px; }
            .legend { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="title-block">
        <h1>sensor_data_dashboard</h1>
        <p id="last-updated">—</p>
    </div>
    <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">connecting</span>
    </div>
</header>

<div class="stats">
    <div class="stat-card temp">
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="latest-temp">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-temp">—</span>
        </div>
    </div>
    <div class="stat-card hum">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="latest-hum">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-hum">—</span>
        </div>
    </div>
</div>

<div class="chart-card">
    <div class="card-header">
        <div class="card-header-group">
            <span class="card-title" id="chart-title">Last 60 minutes</span>
            <button class="btn-range" id="btn-24h">24h</button>
            <button class="btn-range" id="btn-7d" style="display:none;">7d</button>
            <button class="btn-reset" id="btn-reset-zoom">Reset Zoom</button>
        </div>
        <div class="card-header-group">
            <button class="btn-window" id="btn-window">show most recent</button>
            <button class="btn-range" id="btn-humidity-zone">thresholds</button>
            <div class="legend">
                <div class="legend-item"><div class="legend-line" style="background: var(--temp)"></div>Temp °C</div>
                <div class="legend-item"><div class="legend-line" style="background: var(--hum)"></div>Hum %</div>
            </div>
        </div>
    </div>
    <div class="chart-wrap">
        <canvas id="sensorChart"></canvas>
        <div class="no-data" id="no-data-msg">No data available</div>
    </div>
</div>

<div class="table-card">
    <div class="card-header">
        <span class="card-title">Weekly summary</span>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Day</th>
                    <th>Date</th>
                    <th>Avg Temp</th>
                    <th>Avg Humidity</th>
                    <th>Reboots</th>
                </tr>
            </thead>
            <tbody id="summary-body">
                <tr class="empty-row"><td colspan="5">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_BASE = "https://iot-ingestion-api.onrender.com";

    // ── Global State ──
    let isUserExploring = false;
    let cachedHistory = [];
    let chart;
    
    let showMostRecent = false;
    let show24h = false;
    let show7d = false;

    // ── Dynamic Time Scale ──
    const TWO_DAYS_MS = 2 * 24 * 60 * 60 * 1000;
    const THREE_MINS_MS = 3 * 60 * 1000;

    function isToday(ms) {
        return new Date(ms).toDateString() === new Date().toDateString();
    }

    // minUnit controls tick density; displayFormats are overridden by the tick callback below
    function getTimeScaleOptions(xMin, xMax) {
        const spanMs = xMax - xMin;
        if (spanMs > TWO_DAYS_MS) {
            return { minUnit: 'hour',   displayFormats: { hour: 'HH:mm', day: 'EEE' } };
        }
        return { minUnit: 'minute', displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'EEE' } };
    }

    function applyTimeScale(chart, xMin, xMax) {
        const opts = getTimeScaleOptions(xMin, xMax);
        chart.options.scales.x.time.minUnit = opts.minUnit;
        chart.options.scales.x.time.displayFormats = opts.displayFormats;
    }

    function formatEndpointLabel(ms, isRight) {
        if (isRight && (Date.now() - ms) < THREE_MINS_MS) return 'Now';
        const d = new Date(ms);
        const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        if (isToday(ms)) return time;
        const day = d.toLocaleDateString('en-GB', { weekday: 'short' });
        return `${day} ${time}`;
    }

    // ── Endpoint Label Plugin ──
    const endpointLabelPlugin = {
        id: 'endpointLabels',
        afterDraw(chart) {
            const xScale = chart.scales.x;
            if (!xScale) return;

            const ctx = chart.ctx;
            const yPos = xScale.bottom + 14;
            const chartLeft  = xScale.left;
            const chartRight = xScale.right;
            const xMin = xScale.min;
            const xMax = xScale.max;

            ctx.save();
            ctx.font = '500 10px "DM Mono", monospace';
            ctx.fillStyle = '#888880';
            ctx.textBaseline = 'top';

            const leftLabel = formatEndpointLabel(xMin, false);
            ctx.textAlign = 'left';
            ctx.fillText(leftLabel, chartLeft, yPos);

            const rightLabel = formatEndpointLabel(xMax, true);
            ctx.textAlign = 'right';
            ctx.fillText(rightLabel, chartRight, yPos);

            ctx.restore();
        }
    };

    Chart.register(endpointLabelPlugin);

    // ── Smart Fetching Logic ──
    async function fetchHistoricalData(hoursToFetch) {
        let url = `${API_BASE}/readings/history?hours=${hoursToFetch}`;
        
        if (hoursToFetch > 2) {
            url = `${API_BASE}/readings/summary?hours=${hoursToFetch}&buckets=800`;
        }

        try {
            const res = await fetch(url);
            cachedHistory = await res.json();
        } catch (err) {
            console.error('Failed to fetch historical data:', err);
        }
    }

    // ── Chart Helper Functions ──
    function buildSeries(readings, maxGapMinutes) {
        const sorted = readings.slice().sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        const temps = [], hums = [];
        for (let i = 0; i < sorted.length; i++) {
            const t = new Date(sorted[i].timestamp);
            temps.push({ x: t, y: sorted[i].temperature });
            hums.push({  x: t, y: sorted[i].humidity });
            if (i < sorted.length - 1) {
                const gap = (new Date(sorted[i+1].timestamp) - t) / 60000;
                if (gap > maxGapMinutes) {
                    const mid = new Date(t.getTime() + gap * 30000);
                    temps.push({ x: mid, y: null });
                    hums.push({  x: mid, y: null });
                }
            }
        }
        return { temps, hums };
    }

    function buildHumidityZone(readings, enabled) {
        if (!enabled || !readings.some(r => r.humidity > 70)) return [];
        const sorted = readings.slice().sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        return sorted.map(r => ({ x: new Date(r.timestamp), y: r.humidity }));
    }

    // ── Render Chart ──
    function renderChart(xMin, xMax) {
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const gapThreshold = show7d ? 25 : 4;
        const { temps, hums } = buildSeries(cachedHistory, gapThreshold);
        const zoneData = buildHumidityZone(cachedHistory, showHumidityZone);
        const base = { fill: true, tension: 0.35, pointRadius: 0, pointHoverRadius: 4, borderWidth: 1.5, spanGaps: false };

        let trueMin = xMin;
        if (cachedHistory && cachedHistory.length > 0) {
            trueMin = Math.min(...cachedHistory.map(r => new Date(r.timestamp).getTime()));
        }
        const dataMax = Date.now();

        if (chart) {
            chart.data.datasets[0].data = temps;
            chart.data.datasets[1].data = hums;
            chart.data.datasets[2].data = zoneData;
            chart.data.datasets[3].data = zoneData;
            
            chart.options.plugins.zoom.limits = {
                x: { min: trueMin, max: dataMax, minRange: 10 * 60 * 1000 } 
            };

            if (!isUserExploring) {
                chart.options.scales.x.min = xMin;
                chart.options.scales.x.max = xMax;
                applyTimeScale(chart, xMin, xMax);
            }
            
            chart.update('none');
            return;
        }

        const initialTimeOpts = getTimeScaleOptions(xMin, xMax);

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    { ...base, label: 'Temperature (°C)', data: temps, borderColor: '#d94f3d', backgroundColor: 'rgba(217,79,61,0.06)', yAxisID: 'y', order: 1  },
                    { ...base, label: 'Humidity (%)',      data: hums,  borderColor: '#3b82c4', backgroundColor: 'rgba(59,130,196,0.06)', yAxisID: 'y1', order: 1 },
                    {
                        label: 'Humidity 70-80%', data: zoneData, borderColor: 'rgba(255,180,0,0.4)', borderWidth: 1, borderDash: [4, 3],
                        backgroundColor: 'transparent', fill: { target: { value: 70 }, above: 'rgba(255,210,0,0.25)', below: 'transparent' },
                        pointRadius: 0, spanGaps: true, yAxisID: 'y1', tension: 0.35, clip: { top: false, bottom: false, left: false, right: false }, order: 2
                    },
                    {
                        label: 'Humidity >80%', data: zoneData, borderColor: 'rgba(20,20,20,0.45)', borderWidth: 1, borderDash: [4, 3],
                        backgroundColor: 'transparent', fill: { target: { value: 80 }, above: 'rgba(20,20,20,0.3)', below: 'transparent' },
                        pointRadius: 0, spanGaps: true, yAxisID: 'y1', tension: 0.35, order: 2
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'nearest', axis: 'x' },
                plugins: {
                    zoom: {
                        limits: {
                            x: { min: trueMin, max: dataMax, minRange: 10 * 60 * 1000 }
                        },
                        pan: { 
                            enabled: true, mode: 'x', 
                            onPanStart: () => {
                                isUserExploring = true;
                                document.getElementById('btn-reset-zoom').style.display = 'inline-block';
                            },
                            onPan: ({ chart: c }) => {
                                const { min, max } = c.scales.x;
                                applyTimeScale(c, min, max);
                            }
                        },
                        zoom: { 
                            wheel: { enabled: true, speed: 0.12 }, 
                            pinch: { enabled: true }, mode: 'x', 
                            onZoomStart: () => {
                                isUserExploring = true;
                                document.getElementById('btn-reset-zoom').style.display = 'inline-block';
                                return true;
                            },
                            onZoom: ({ chart: c }) => {
                                const { min, max } = c.scales.x;
                                applyTimeScale(c, min, max);
                            }
                        }
                    },
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#ffffff', borderColor: '#e8e8e4', borderWidth: 1, titleColor: '#888880', bodyColor: '#1a1a18',
                        titleFont: { family: 'DM Mono', size: 11 }, bodyFont: { family: 'DM Mono', size: 12 }, padding: 10,
                        filter: item => item.datasetIndex < 2,
                        callbacks: {
                            title: items => {
                                if (!items.length) return '';
                                const d = new Date(items[0].parsed.x);
                                return d.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                            },
                            label: ctx => ` ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '—'}${ctx.datasetIndex === 0 ? '°C' : '%'}`
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time', min: xMin, max: xMax,
                        time: initialTimeOpts,
                        grid: { color: '#f0f0ec' }, border: { display: false },
                        ticks: {
                            color: '#888880', font: { family: 'DM Mono', size: 10 },
                            maxRotation: 0, autoSkip: true, maxTicksLimit: 6,
                            callback: function(value) {
                                const d = new Date(value);
                                const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                                if (isToday(value)) return time;
                                const day = d.toLocaleDateString('en-GB', { weekday: 'short' });
                                return `${day} ${time}`;
                            }
                        }
                    },
                    y: {
                        position: 'left', grid: { color: '#f0f0ec' }, border: { display: false },
                        ticks: { color: '#d94f3d', font: { family: 'DM Mono', size: 10 }, count: 7, callback: function(v) { return (this.chart.scales.y.max - this.chart.scales.y.min) < 2 ? v.toFixed(2) + '°' : v.toFixed(1) + '°'; } }
                    },
                    y1: {
                        position: 'right', grid: { drawOnChartArea: false }, border: { display: false },
                        ticks: { color: '#3b82c4', font: { family: 'DM Mono', size: 10 }, count: 7, callback: function(v) { return (this.chart.scales.y1.max - this.chart.scales.y1.min) < 2 ? v.toFixed(2) + '%' : v.toFixed(1) + '%'; } }
                    }
                }
            }
        });
    }

    // ── Main Controller ──
    async function loadFullDashboard() {
        if (isUserExploring) return; 

        const dot = document.getElementById('status-dot');
        const txt = document.getElementById('status-text');
        dot.className = 'status-dot loading';
        txt.innerText = 'updating...';

        try {
            const latestRes = await fetch(`${API_BASE}/readings/latest`);
            const latest = await latestRes.json();
            document.getElementById('latest-temp').innerText = `${latest.temperature.toFixed(1)}°C`;
            document.getElementById('latest-hum').innerText  = `${latest.humidity.toFixed(1)}%`;

            const now = Date.now();
            let xMin, xMax, hoursRequired;

            if (show7d) {
                hoursRequired = 168;
                xMin = now - 7 * 24 * 60 * 60 * 1000;
            } else if (show24h) {
                hoursRequired = 24;
                xMin = now - 24 * 60 * 60 * 1000;
            } else {
                hoursRequired = 1; 
                xMin = now - 60 * 60 * 1000;
            }
            xMax = now;

            await fetchHistoricalData(hoursRequired);

            renderChart(xMin, xMax);
            updateStatus(latest.timestamp); 

        } catch (err) {
            console.error('Update failed:', err);
            dot.className = 'status-dot offline';
            txt.innerText = 'api offline';
        }
    }

    // ── Button Listeners ──
    const btnWindow = document.getElementById('btn-window');
    const btn24h   = document.getElementById('btn-24h');
    const btn7d = document.getElementById('btn-7d');

    btnWindow.addEventListener('click', () => {
        showMostRecent = !showMostRecent;
        btnWindow.classList.toggle('active', showMostRecent);
        btnWindow.innerText = showMostRecent ? 'show last hour' : 'show most recent';
        document.getElementById('chart-title').innerText = showMostRecent ? 'Most recent data' : (show24h ? 'Last 24 hours' : 'Last 60 minutes');
        loadFullDashboard();
    });

    btn24h.addEventListener('click', () => {
        show24h = !show24h;
        btn24h.classList.toggle('active', show24h);
        if (show24h) {
            show7d = false; showMostRecent = false;
            btn7d.classList.remove('active'); btnWindow.classList.remove('active');
            btnWindow.innerText = 'show most recent';
        }
        document.getElementById('chart-title').innerText = show24h ? 'Last 24 hours' : 'Last 60 minutes';
        loadFullDashboard();
    });

    btn7d.addEventListener('click', () => {
        show7d = !show7d;
        btn7d.classList.toggle('active', show7d);
        if (show7d) {
            show24h = false; showMostRecent = false;
            btn24h.classList.remove('active'); btnWindow.classList.remove('active');
            btnWindow.innerText = 'show most recent';
            document.getElementById('chart-title').innerText = 'Last 7 days';
        } else {
            document.getElementById('chart-title').innerText = 'Last 60 minutes';
        }
        loadFullDashboard();
    });

    document.getElementById('btn-reset-zoom').addEventListener('click', () => {
        isUserExploring = false;
        document.getElementById('btn-reset-zoom').style.display = 'none';
        
        if (chart) {
            chart.resetZoom();
        }
        loadFullDashboard(); 
    });

    let showHumidityZone = true;
    const btnHumidityZone = document.getElementById('btn-humidity-zone');
    btnHumidityZone.classList.add('active'); 
    btnHumidityZone.addEventListener('click', () => {
        showHumidityZone = !showHumidityZone;
        btnHumidityZone.classList.toggle('active', showHumidityZone);
        if (chart) { chart.destroy(); chart = null; }
        
        const now = Date.now();
        const currentMin = show7d ? now - 7*24*60*60*1000 : (show24h ? now - 24*60*60*1000 : now - 60*60*1000);
        renderChart(currentMin, now);
    });

    // ── Initialization & Timers ──
    function updateStatus(timestamp) {
        const diff = Math.floor((Date.now() - new Date(timestamp)) / 1000);
        const mins = Math.floor(diff / 60);
        const dot  = document.getElementById('status-dot');
        const txt  = document.getElementById('status-text');
        const upd  = document.getElementById('last-updated');
        dot.className = 'status-dot ' + (mins < 2 ? 'online' : 'offline');
        txt.innerText  = mins < 2 ? 'pico online' : 'pico offline';
        if (diff < 60) upd.innerText = 'updated just now';
        else if (mins === 1) upd.innerText = 'updated 1 min ago';
        else if (mins < 60) upd.innerText = `updated ${mins} mins ago`;
        else upd.innerText = `updated ${Math.floor(mins / 60)}h ago`;
    }

    async function loadSummary() {
        const body = document.getElementById('summary-body');
        body.innerHTML = `<tr><td colspan="5" class="table-loading">Fetching weekly data...</td></tr>`;
        try {
            const res = await fetch(`${API_BASE}/summaries/`);
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            const summaries = await res.json();
            if (!summaries || summaries.length === 0) {
                body.innerHTML = `<tr class="empty-row"><td colspan="5" style="text-align: center;">No summary data available.</td></tr>`;
                return;
            }
            body.innerHTML = summaries.map(day => {
                const d = new Date(day.date);
                return `<tr>
                    <td class="cell-mono">${d.toLocaleDateString('en-GB', { weekday: 'long' })}</td>
                    <td class="cell-mono">${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</td>
                    <td class="cell-temp">${day.avg_temp.toFixed(1)}°C</td>
                    <td class="cell-hum">${day.avg_humidity.toFixed(1)}%</td>
                    <td class="cell-mono">${day.reboot_count}</td>
                </tr>`;
            }).join('');
        } catch (e) {
            body.innerHTML = `<tr class="empty-row"><td colspan="5" style="text-align: center; color: var(--offline);">Failed to load summaries. Retrying soon...</td></tr>`;
        }
    }

    async function loadOneHourAgo() {
        const agoTemp = document.getElementById('ago-temp');
        const agoHum  = document.getElementById('ago-hum');
        try {
            const res = await fetch(`${API_BASE}/readings/at-offset`);
            if (res.status === 404) return;
            const data = await res.json();
            agoTemp.innerText = `${data.temperature.toFixed(1)}°C`;
            agoHum.innerText  = `${data.humidity.toFixed(1)}%`;
        } catch (e) {
            agoTemp.innerText = '—'; agoHum.innerText  = '—';
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key.toLowerCase() === 'd' && !e.ctrlKey && !e.metaKey && !e.altKey) {
            btnWindow.classList.toggle('visible');
            const show = btn7d.style.display === 'none';
            btn7d.style.display = show ? 'inline-block' : 'none';
        }
    });

    loadFullDashboard();
    loadSummary();
    loadOneHourAgo();
    setInterval(loadFullDashboard, 30000);
    setInterval(loadOneHourAgo, 30000);
</script>

</body>
</html>
