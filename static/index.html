<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f7f7f5;
            --surface:   #ffffff;
            --border:    #e8e8e4;
            --text:      #1a1a18;
            --muted:     #888880;
            --temp:      #d94f3d;
            --temp-bg:   rgba(217, 79, 61, 0.07);
            --hum:       #3b82c4;
            --hum-bg:    rgba(59, 130, 196, 0.07);
            --online:    #3db86a;
            --offline:   #d94f3d;
            --radius:    12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-block h1 {
            font-family: 'DM Mono', monospace;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .title-block p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
            font-family: 'DM Mono', monospace;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }

        .status-dot.online  { background: var(--online);  box-shadow: 0 0 0 3px rgba(61,184,106,0.2); }
        .status-dot.offline { background: var(--offline); box-shadow: 0 0 0 3px rgba(217,79,61,0.2); }

        /* ── Stat Cards ── */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.4s ease forwards;
        }

        .stat-card:nth-child(2) { animation-delay: 0.07s; }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card.temp::before { background: var(--temp-bg); }
        .stat-card.hum::before  { background: var(--hum-bg); }
        .stat-card:hover::before { opacity: 1; }

        .stat-label {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.03em;
            transition: color 0.3s;
        }

        .stat-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-ago {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--muted);
        }



        .stat-card.temp .stat-value { color: var(--temp); }
        .stat-card.hum  .stat-value { color: var(--hum); }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.4s ease 0.14s forwards;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .legend {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .legend-line {
            width: 18px;
            height: 2px;
            border-radius: 2px;
        }

        .chart-wrap {
            position: relative;
            height: 280px;
        }

        .no-data {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: var(--muted);
        }

        /* ── Summary Table ── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            opacity: 0;
            animation: fadeUp 0.4s ease 0.21s forwards;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        thead th {
            font-size: 0.68rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding: 0 0 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 13px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--bg); }

        .cell-temp { color: var(--temp); font-family: 'DM Mono', monospace; }
        .cell-hum  { color: var(--hum);  font-family: 'DM Mono', monospace; }
        .cell-mono { font-family: 'DM Mono', monospace; color: var(--text); }

        .empty-row td {
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            padding: 20px 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .stats { grid-template-columns: 1fr; }
            .stat-value { font-size: 2.2rem; }
            body { padding: 20px 16px; }
            .legend { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="title-block">
        <h1>sensor_data_dashboard</h1>
        <p id="last-updated">—</p>
    </div>
    <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">connecting</span>
    </div>
</header>

<div class="stats">
    <div class="stat-card temp">
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="latest-temp">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-temp">—</span>
        </div>
    </div>
    <div class="stat-card hum">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="latest-hum">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-hum">—</span>
        </div>
    </div>
</div>

<div class="chart-card">
    <div class="card-header">
        <span class="card-title">Last 60 minutes</span>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-line" style="background: var(--temp)"></div>
                Temp °C
            </div>
            <div class="legend-item">
                <div class="legend-line" style="background: var(--hum)"></div>
                Hum %
            </div>
        </div>
    </div>
    <div class="chart-wrap">
        <canvas id="sensorChart"></canvas>
        <div class="no-data" id="no-data-msg">No data in the last hour</div>
    </div>
</div>

<div class="table-card">
    <div class="card-header">
        <span class="card-title">Weekly summary</span>
    </div>
    <table>
        <thead>
            <tr>
                <th>Day</th>
                <th>Date</th>
                <th>Avg Temp</th>
                <th>Avg Humidity</th>
                <th>Reboots</th>
            </tr>
        </thead>
        <tbody id="summary-body">
            <tr class="empty-row"><td colspan="5">Loading…</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API_BASE = "https://iot-ingestion-api.onrender.com";

    // ── Status indicator ──────────────────────────────────────────
    function updateStatus(timestamp) {
        const diff = Math.floor((Date.now() - new Date(timestamp)) / 1000);
        const mins = Math.floor(diff / 60);
        const dot  = document.getElementById('status-dot');
        const txt  = document.getElementById('status-text');
        const upd  = document.getElementById('last-updated');

        dot.className = 'status-dot ' + (mins < 2 ? 'online' : 'offline');
        txt.innerText  = mins < 2 ? 'pico online' : 'pico offline';

        if (diff < 60)       upd.innerText = 'updated just now';
        else if (mins === 1) upd.innerText = 'updated 1 min ago';
        else if (mins < 60)  upd.innerText = `updated ${mins} mins ago`;
        else                 upd.innerText = `updated ${Math.floor(mins / 60)}h ago`;
    }

    // ── Chart ─────────────────────────────────────────────────────
    let chart;

    function buildChart(labels, temps, hums) {
        const ctx    = document.getElementById('sensorChart').getContext('2d');
        const noData = document.getElementById('no-data-msg');

        if (!labels.length) {
            noData.style.display = 'flex';
            if (chart) { chart.destroy(); chart = null; }
            return;
        }

        noData.style.display = 'none';

        const base = {
            fill: true,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 1.5,
            spanGaps: false,
        };

        if (chart) {
            chart.data.labels           = labels;
            chart.data.datasets[0].data = temps;
            chart.data.datasets[1].data = hums;
            chart.update('none');
            return;
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [
                    { ...base, label: 'Temperature (°C)', data: temps, borderColor: '#d94f3d', backgroundColor: 'rgba(217,79,61,0.06)', yAxisID: 'y'  },
                    { ...base, label: 'Humidity (%)',      data: hums,  borderColor: '#3b82c4', backgroundColor: 'rgba(59,130,196,0.06)', yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#ffffff',
                        borderColor: '#e8e8e4',
                        borderWidth: 1,
                        titleColor: '#888880',
                        bodyColor: '#1a1a18',
                        titleFont: { family: 'DM Mono', size: 11 },
                        bodyFont:  { family: 'DM Mono', size: 12 },
                        padding: 10,
                        callbacks: {
                            label: ctx => {
                                const unit = ctx.datasetIndex === 0 ? '°C' : '%';
                                return ` ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '—'}${unit}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#f0f0ec' },
                        border: { display: false },
                        ticks: { 
                            color: '#888880', 
                            font: { family: 'DM Mono', size: 10 }, 
                            maxRotation: 0,
                            maxTicksLimit: 7
                        }
                    },
                    y: {
                        position: 'left',
                        grid: { color: '#f0f0ec' },
                        border: { display: false },
                        ticks: {
                            color: '#d94f3d',
                            font: { family: 'DM Mono', size: 10 },
                            count: 7,
                            callback: function(v) {
                                const range = this.chart.scales.y.max - this.chart.scales.y.min;
                                return range < 2 ? v.toFixed(2) + '°' : v.toFixed(1) + '°';
                            }
                        }
                    },
                    y1: {
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        border: { display: false },
                        ticks: {
                            color: '#3b82c4',
                            font: { family: 'DM Mono', size: 10 },
                            count: 7,
                            callback: function(v) {
                                const range = this.chart.scales.y1.max - this.chart.scales.y1.min;
                                return range < 2 ? v.toFixed(2) + '%' : v.toFixed(1) + '%';
                            }
                        }
                    }
                }
            }
        });
    }

    // ── Weekly summary ────────────────────────────────────────────
    async function loadSummary() {
        try {
            const res = await fetch(`${API_BASE}/summaries/`);
            if (!res.ok) return;
            const summaries = await res.json();
            const body = document.getElementById('summary-body');

            if (!summaries || summaries.length === 0) {
                body.innerHTML = `<tr class="empty-row"><td colspan="5">Waiting for daily summary…</td></tr>`;
                return;
            }

            body.innerHTML = summaries.map(day => {
                const d = new Date(day.date);
                const weekday = d.toLocaleDateString('en-GB', { weekday: 'long' });
                const date    = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                return `
                <tr>
                    <td class="cell-mono">${weekday}</td>
                    <td class="cell-mono">${date}</td>
                    <td class="cell-temp">${day.avg_temp.toFixed(1)}°C</td>
                    <td class="cell-hum">${day.avg_humidity.toFixed(1)}%</td>
                    <td class="cell-mono">${day.reboot_count}</td>
                </tr>`;
            }).join('');
        } catch (e) {
            console.error('Summary fetch failed:', e);
        }
    }

    // ── Main update ───────────────────────────────────────────────
    async function update() {
        try {
            const latestRes = await fetch(`${API_BASE}/readings/latest`);
            const latest    = await latestRes.json();

            document.getElementById('latest-temp').innerText = `${latest.temperature.toFixed(1)}°C`;
            document.getElementById('latest-hum').innerText  = `${latest.humidity.toFixed(1)}%`;
            updateStatus(latest.timestamp);

            // Hard server-side 1-hour cutoff
            const histRes = await fetch(`${API_BASE}/readings/history?hours=1`);
            const history = await histRes.json();

            const labels = [], temps = [], hums = [];

            if (history && history.length > 0) {
                const data = history.slice().reverse();

                for (let i = 0; i < data.length; i++) {
                    labels.push(new Date(data[i].timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
                    temps.push(data[i].temperature);
                    hums.push(data[i].humidity);

                    // Null gap for outages > 2 min
                    if (i < data.length - 1) {
                        const gap = (new Date(data[i + 1].timestamp) - new Date(data[i].timestamp)) / 60000;
                        if (gap > 2) { labels.push(''); temps.push(null); hums.push(null); }
                    }
                }
            }

            buildChart(labels, temps, hums);

        } catch (err) {
            console.error('Update failed:', err);
            document.getElementById('status-dot').className = 'status-dot offline';
            document.getElementById('status-text').innerText = 'api offline';
        }
    }

    // ── 1 hour ago ───────────────────────────────────────────────
    async function loadOneHourAgo() {
        const agoTemp = document.getElementById('ago-temp');
        const agoHum  = document.getElementById('ago-hum');
        try {
            const res = await fetch(`${API_BASE}/readings/hour-ago`);
            if (res.status === 404) {
                agoTemp.innerText = '—';
                agoHum.innerText  = '—';
                return;
            }
            const data = await res.json();
            agoTemp.innerText = `${data.temperature.toFixed(1)}°C`;
            agoHum.innerText  = `${data.humidity.toFixed(1)}%`;
        } catch (e) {
            agoTemp.innerText = '—';
            agoHum.innerText  = '—';
            console.error('1h ago fetch failed:', e);
        }
    }

    update();
    loadSummary();
    loadOneHourAgo();
    setInterval(update, 30000);
    setInterval(loadOneHourAgo, 30000);
</script>

</body>
</html>
