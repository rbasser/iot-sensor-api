<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://raw.githubusercontent.com/rbasser/iot-sensor-api/main/static/SensorData.png" type="image/png">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #f7f7f5;
            --surface:   #ffffff;
            --border:    #e8e8e4;
            --text:      #1a1a18;
            --muted:     #888880;
            --temp:      #d94f3d;
            --temp-bg:   rgba(217, 79, 61, 0.07);
            --hum:       #3b82c4;
            --hum-bg:    rgba(59, 130, 196, 0.07);
            --online:    #3db86a;
            --offline:   #d94f3d;
            --radius:    12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
        }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .title-block h1 {
            font-family: 'DM Mono', monospace;
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .title-block p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 2px;
            font-family: 'DM Mono', monospace;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s, box-shadow 0.3s;
            flex-shrink: 0;
        }

        .status-dot.online  { background: var(--online);  box-shadow: 0 0 0 3px rgba(61,184,106,0.2); }
        .status-dot.offline { background: var(--offline); box-shadow: 0 0 0 3px rgba(217,79,61,0.2); }

        /* ── Stat Cards ── */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.4s ease forwards;
        }

        .stat-card:nth-child(2) { animation-delay: 0.07s; }

        .stat-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card.temp::before { background: var(--temp-bg); }
        .stat-card.hum::before  { background: var(--hum-bg); }
        .stat-card:hover::before { opacity: 1; }

        .stat-label {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'DM Mono', monospace;
            font-size: 2.8rem;
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.03em;
            transition: color 0.3s;
        }

        .stat-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-ago {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--muted);
        }



        .stat-card.temp .stat-value { color: var(--temp); }
        .stat-card.hum  .stat-value { color: var(--hum); }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 16px;
            opacity: 0;
            animation: fadeUp 0.4s ease 0.14s forwards;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .legend {
            display: flex;
            gap: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            color: var(--muted);
        }

        .legend-line {
            width: 18px;
            height: 2px;
            border-radius: 2px;
        }

        .btn-window {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 12px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-window { display: none; }
        .btn-window.visible { display: inline-block; }
        .btn-window:hover { border-color: var(--text); color: var(--text); }
        .btn-range {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 10px;
            font-family: 'DM Mono', monospace;
            font-size: 0.68rem;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .btn-range:hover { border-color: var(--text); color: var(--text); }
        .btn-range.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--surface);
        }
        .btn-window.active {
            background: var(--text);
            border-color: var(--text);
            color: var(--surface);
        }

        .chart-wrap {
            position: relative;
            height: 280px;
        }

        .no-data {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: var(--muted);
        }

        /* ── Summary Table ── */
        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            opacity: 0;
            animation: fadeUp 0.4s ease 0.21s forwards;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        thead th {
            font-size: 0.68rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            padding: 0 0 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 13px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--bg); }

        .cell-temp { color: var(--temp); font-family: 'DM Mono', monospace; }
        .cell-hum  { color: var(--hum);  font-family: 'DM Mono', monospace; }
        .cell-mono { font-family: 'DM Mono', monospace; color: var(--text); }

        .empty-row td {
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            padding: 20px 0;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 520px) {
            .stats { grid-template-columns: 1fr; }
            .stat-value { font-size: 2.2rem; }
            body { padding: 20px 16px; }
            .legend { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="title-block">
        <h1>sensor_data_dashboard</h1>
        <p id="last-updated">—</p>
    </div>
    <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">connecting</span>
    </div>
</header>

<div class="stats">
    <div class="stat-card temp">
        <div class="stat-label">Temperature</div>
        <div class="stat-value" id="latest-temp">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-temp">—</span>
        </div>
    </div>
    <div class="stat-card hum">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="latest-hum">—</div>
        <div class="stat-sub">
            <span>1h ago</span>
            <span class="stat-ago" id="ago-hum">—</span>
        </div>
    </div>
</div>

<div class="chart-card">
    <div class="card-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <span class="card-title" id="chart-title">Last 60 minutes</span>
            <button class="btn-range" id="btn-24h">24h</button>
            <button class="btn-range" id="btn-7d" style="display:none;">7d</button>
        </div>
        <div style="display:flex; align-items:center; gap:16px;">
            <button class="btn-window" id="btn-window">show most recent</button>
            <button class="btn-range" id="btn-humidity-zone">thresholds</button>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-line" style="background: var(--temp)"></div>
                    Temp °C
                </div>
                <div class="legend-item">
                    <div class="legend-line" style="background: var(--hum)"></div>
                    Hum %
                </div>
            </div>
        </div>
    </div>
    <div class="chart-wrap">
        <canvas id="sensorChart"></canvas>
        <div class="no-data" id="no-data-msg">No data in the last hour</div>
    </div>
</div>

<div class="table-card">
    <div class="card-header">
        <span class="card-title">Weekly summary</span>
    </div>
    <table>
        <thead>
            <tr>
                <th>Day</th>
                <th>Date</th>
                <th>Avg Temp</th>
                <th>Avg Humidity</th>
                <th>Reboots</th>
            </tr>
        </thead>
        <tbody id="summary-body">
            <tr class="empty-row"><td colspan="5">Loading…</td></tr>
        </tbody>
    </table>
</div>

<script>
    const API_BASE = "https://iot-ingestion-api.onrender.com";

    // ── Window toggle — false = rolling last hour, true = most recent data ──
    let showMostRecent = false;
    let show24h = false;
    const btnWindow = document.getElementById('btn-window');
    const btn24h   = document.getElementById('btn-24h');

    btnWindow.addEventListener('click', () => {
        showMostRecent = !showMostRecent;
        btnWindow.classList.toggle('active', showMostRecent);
        btnWindow.innerText = showMostRecent ? 'show last hour' : 'show most recent';
        document.getElementById('chart-title').innerText = showMostRecent ? 'Most recent data' : (show24h ? 'Last 24 hours' : 'Last 60 minutes');
        updateChart();
    });

    btn24h.addEventListener('click', () => {
        show24h = !show24h;
        btn24h.classList.toggle('active', show24h);
        if (show24h) {
            showMostRecent = false;
            show7d = false;
            btn7d.classList.remove('active');
            btnWindow.classList.remove('active');
            btnWindow.innerText = 'show most recent';
        }
        document.getElementById('chart-title').innerText = show24h ? 'Last 24 hours' : 'Last 60 minutes';
        update();
    });

    // ── 7d toggle (debug, revealed with 'd') ────────────────────────
    let show7d = false;
    const btn7d = document.getElementById('btn-7d');
    btn7d.addEventListener('click', () => {
        show7d = !show7d;
        btn7d.classList.toggle('active', show7d);
        if (show7d) {
            show24h = false;
            showMostRecent = false;
            btn24h.classList.remove('active');
            btnWindow.classList.remove('active');
            btnWindow.innerText = 'show most recent';
            document.getElementById('chart-title').innerText = 'Last 7 days';
        } else {
            document.getElementById('chart-title').innerText = 'Last 60 minutes';
        }
        update();
    });

    // ── Humidity zone toggle (debug, revealed with 'd') ─────────────
    let showHumidityZone = true;
    const btnHumidityZone = document.getElementById('btn-humidity-zone');
    btnHumidityZone.classList.add('active');  // on by default
    btnHumidityZone.addEventListener('click', () => {
        showHumidityZone = !showHumidityZone;
        btnHumidityZone.classList.toggle('active', showHumidityZone);
        // Need to destroy and recreate chart to add/remove annotation plugin
        if (chart) { chart.destroy(); chart = null; }
        updateChart();
    });

    // ── Status indicator ──────────────────────────────────────────
    function updateStatus(timestamp) {
        const diff = Math.floor((Date.now() - new Date(timestamp)) / 1000);
        const mins = Math.floor(diff / 60);
        const dot  = document.getElementById('status-dot');
        const txt  = document.getElementById('status-text');
        const upd  = document.getElementById('last-updated');

        dot.className = 'status-dot ' + (mins < 2 ? 'online' : 'offline');
        txt.innerText  = mins < 2 ? 'pico online' : 'pico offline';

        if (diff < 60)       upd.innerText = 'updated just now';
        else if (mins === 1) upd.innerText = 'updated 1 min ago';
        else if (mins < 60)  upd.innerText = `updated ${mins} mins ago`;
        else                 upd.innerText = `updated ${Math.floor(mins / 60)}h ago`;
    }

    // ── Chart ─────────────────────────────────────────────────────
    let chart;
    let cachedHistory = [];

    // Reduce point count for large time windows to keep rendering fast.
    function downsample(readings, maxPoints) {
        if (!maxPoints || readings.length <= maxPoints) return readings;
        const step = Math.ceil(readings.length / maxPoints);
        return readings.filter((_, i) => i % step === 0);
    }

    // Convert readings into {x: Date, y: value} point arrays.
    // Inserts a null point into gaps > 2 min so spanGaps:false draws a break.
    function buildSeries(readings) {
        const sorted = readings.slice().sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        const temps = [], hums = [];
        for (let i = 0; i < sorted.length; i++) {
            const t = new Date(sorted[i].timestamp);
            temps.push({ x: t, y: sorted[i].temperature });
            hums.push({  x: t, y: sorted[i].humidity });
            if (i < sorted.length - 1) {
                const gap = (new Date(sorted[i+1].timestamp) - t) / 60000;
                if (gap > 2) {
                    const mid = new Date(t.getTime() + gap * 30000);
                    temps.push({ x: mid, y: null });
                    hums.push({  x: mid, y: null });
                }
            }
        }
        return { temps, hums };
    }

    // Decide the x-axis min/max and which readings to show.
    function updateChart() {
        const now = Date.now();
        let xMin, xMax, filtered;

        if (showMostRecent) {
            if (cachedHistory.length === 0) {
                filtered = [];
                xMin = new Date(now - 60 * 60 * 1000);
                xMax = new Date(now);
            } else {
                const newest = Math.max(...cachedHistory.map(r => new Date(r.timestamp).getTime()));
                xMax = new Date(newest);
                xMin = new Date(newest - 60 * 60 * 1000);
                filtered = cachedHistory.filter(r => new Date(r.timestamp).getTime() >= xMin.getTime());
            }
        } else if (show7d) {
            xMin = new Date(now - 7 * 24 * 60 * 60 * 1000);
            xMax = new Date(now);
            filtered = cachedHistory.filter(r => new Date(r.timestamp).getTime() >= xMin.getTime());
        } else if (show24h) {
            xMin = new Date(now - 24 * 60 * 60 * 1000);
            xMax = new Date(now);
            filtered = cachedHistory.filter(r => new Date(r.timestamp).getTime() >= xMin.getTime());
        } else {
            xMin = new Date(now - 60 * 60 * 1000);
            xMax = new Date(now);
            filtered = cachedHistory.filter(r => new Date(r.timestamp).getTime() >= xMin.getTime());
        }

        renderChart(filtered, xMin, xMax);
    }

    // Build zone dataset — returns the raw humidity series used for threshold fills.
    // Chart.js fill.target.value draws a fill between the line and a constant value.
    // We use this twice: once capped at 80 (yellow zone 70-80), once uncapped (black zone >80).
    function buildHumidityZone(readings, enabled) {
        if (!enabled) return [];
        const sorted = readings.slice().sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
        return sorted.map(r => ({ x: new Date(r.timestamp), y: r.humidity }));
    }

    function renderChart(readings, xMin, xMax) {
        const ctx    = document.getElementById('sensorChart').getContext('2d');
        const noData = document.getElementById('no-data-msg');
        noData.style.display = 'none';

        const { temps, hums } = buildSeries(readings);
        const zoneData = buildHumidityZone(readings, showHumidityZone);
        const zone70 = zoneData;
        const zone80 = zoneData;

        const base = {
            fill: true,
            tension: 0.35,
            pointRadius: 0,
            pointHoverRadius: 4,
            borderWidth: 1.5,
            spanGaps: false,
        };

        if (chart) {
            chart.data.datasets[0].data = temps;
            chart.data.datasets[1].data = hums;
            const zd = buildHumidityZone(readings, showHumidityZone);
            chart.data.datasets[2].data = zd;
            chart.data.datasets[3].data = zd;
            chart.options.scales.x.min       = xMin;
            chart.options.scales.x.max       = xMax;
            chart.options.scales.x.time.stepSize = show7d ? 720 : (show24h ? 60 : 10);
            chart.update('none');
            return;
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [
                    { ...base, label: 'Temperature (°C)', data: temps, borderColor: '#d94f3d', backgroundColor: 'rgba(217,79,61,0.06)', yAxisID: 'y'  },
                    { ...base, label: 'Humidity (%)',      data: hums,  borderColor: '#3b82c4', backgroundColor: 'rgba(59,130,196,0.06)', yAxisID: 'y1' },
                    {
                        // Yellow fill between 70% line and data (only where data > 70)
                        label: 'Humidity 70-80%',
                        data: zone70,
                        borderColor: 'rgba(255,180,0,0.4)',
                        borderWidth: 1,
                        borderDash: [4, 3],
                        backgroundColor: 'transparent',
                        fill: { target: { value: 70 }, above: 'rgba(255,210,0,0.25)', below: 'transparent' },
                        pointRadius: 0,
                        spanGaps: true,
                        yAxisID: 'y1',
                        tension: 0.35,
                        clip: { top: false, bottom: false, left: false, right: false },
                    },
                    {
                        // Dark fill above 80% line
                        label: 'Humidity >80%',
                        data: zone80,
                        borderColor: 'rgba(20,20,20,0.45)',
                        borderWidth: 1,
                        borderDash: [4, 3],
                        backgroundColor: 'transparent',
                        fill: { target: { value: 80 }, above: 'rgba(20,20,20,0.3)', below: 'transparent' },
                        pointRadius: 0,
                        spanGaps: true,
                        yAxisID: 'y1',
                        tension: 0.35,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#ffffff',
                        borderColor: '#e8e8e4',
                        borderWidth: 1,
                        titleColor: '#888880',
                        bodyColor: '#1a1a18',
                        titleFont: { family: 'DM Mono', size: 11 },
                        bodyFont:  { family: 'DM Mono', size: 12 },
                        padding: 10,
                        callbacks: {
                            title: items => {
                                if (!items.length) return '';
                                const d = new Date(items[0].parsed.x);
                                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                            },
                            label: ctx => {
                                const unit = ctx.datasetIndex === 0 ? '°C' : '%';
                                return ` ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '—'}${unit}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        min: xMin,
                        max: xMax,
                        time: {
                            unit: 'minute',
                            stepSize: show7d ? 720 : (show24h ? 60 : 10),
                            displayFormats: { minute: 'HH:mm', hour: 'HH:mm' }
                        },
                        grid: { color: '#f0f0ec' },
                        border: { display: false },
                        ticks: {
                            color: '#888880',
                            font: { family: 'DM Mono', size: 10 },
                            maxRotation: 0,
                            autoSkip: false,
                        }
                    },
                    y: {
                        position: 'left',
                        grid: { color: '#f0f0ec' },
                        border: { display: false },
                        ticks: {
                            color: '#d94f3d',
                            font: { family: 'DM Mono', size: 10 },
                            count: 7,
                            callback: function(v) {
                                const range = this.chart.scales.y.max - this.chart.scales.y.min;
                                return range < 2 ? v.toFixed(2) + '°' : v.toFixed(1) + '°';
                            }
                        }
                    },
                    y1: {
                        position: 'right',
                        grid: { drawOnChartArea: false },
                        border: { display: false },
                        ticks: {
                            color: '#3b82c4',
                            font: { family: 'DM Mono', size: 10 },
                            count: 7,
                            callback: function(v) {
                                const range = this.chart.scales.y1.max - this.chart.scales.y1.min;
                                return range < 2 ? v.toFixed(2) + '%' : v.toFixed(1) + '%';
                            }
                        }
                    }
                }
            }
        });
    }

        // ── Main update ───────────────────────────────────────────────
    async function update() {
        try {
            const latestRes = await fetch(`${API_BASE}/readings/latest`);
            const latest    = await latestRes.json();

            document.getElementById('latest-temp').innerText = `${latest.temperature.toFixed(1)}°C`;
            document.getElementById('latest-hum').innerText  = `${latest.humidity.toFixed(1)}%`;
            updateStatus(latest.timestamp);

            // Fetch appropriate window based on active mode
            const hoursToFetch = show7d ? 168 : (show24h ? 24 : 2);
            const histRes = await fetch(`${API_BASE}/readings/history?hours=${hoursToFetch}`);
            cachedHistory = await histRes.json();

            updateChart();

        } catch (err) {
            console.error('Update failed:', err);
            document.getElementById('status-dot').className = 'status-dot offline';
            document.getElementById('status-text').innerText = 'api offline';
        }
    }

    async function loadOneHourAgo() {
        const agoTemp = document.getElementById('ago-temp');
        const agoHum  = document.getElementById('ago-hum');
        try {
            const res = await fetch(`${API_BASE}/readings/at-offset`);
            if (res.status === 404) {
                agoTemp.innerText = '—';
                agoHum.innerText  = '—';
                return;
            }
            const data = await res.json();
            agoTemp.innerText = `${data.temperature.toFixed(1)}°C`;
            agoHum.innerText  = `${data.humidity.toFixed(1)}%`;
        } catch (e) {
            agoTemp.innerText = '—';
            agoHum.innerText  = '—';
            console.error('1h ago fetch failed:', e);
        }
    }

    // ── Weekly summary ────────────────────────────────────────────
    async function loadSummary() {
        try {
            const res = await fetch(`${API_BASE}/summaries/`);
            if (!res.ok) return;
            const summaries = await res.json();
            const body = document.getElementById('summary-body');

            if (!summaries || summaries.length === 0) {
                body.innerHTML = `<tr class="empty-row"><td colspan="5">Waiting for daily summary…</td></tr>`;
                return;
            }

            body.innerHTML = summaries.map(day => {
                const d = new Date(day.date);
                const weekday = d.toLocaleDateString('en-GB', { weekday: 'long' });
                const date    = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                return `
                <tr>
                    <td class="cell-mono">${weekday}</td>
                    <td class="cell-mono">${date}</td>
                    <td class="cell-temp">${day.avg_temp.toFixed(1)}°C</td>
                    <td class="cell-hum">${day.avg_humidity.toFixed(1)}%</td>
                    <td class="cell-mono">${day.reboot_count}</td>
                </tr>`;
            }).join('');
        } catch (e) {
            console.error('Summary fetch failed:', e);
        }
    }

    // Press 'd' to reveal/hide the debug buttons (show most recent + 7d)
    document.addEventListener('keydown', e => {
        if (e.key === 'd' && !e.ctrlKey && !e.metaKey && !e.altKey) {
            btnWindow.classList.toggle('visible');
            const show = btn7d.style.display === 'none';
            btn7d.style.display = show ? 'inline-block' : 'none';
            if (!show && show7d) {
                show7d = false;
                btn7d.classList.remove('active');
                document.getElementById('chart-title').innerText = show24h ? 'Last 24 hours' : 'Last 60 minutes';
                update();
            }
        }
    });

    update();
    loadSummary();
    loadOneHourAgo();
    setInterval(update, 30000);
    setInterval(loadOneHourAgo, 30000);
</script>

</body>
</html>
