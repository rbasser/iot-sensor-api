databases:
  - name: sensor-db
    databaseName: sensor_db
    user: rombs
    plan: free 

services:
  - type: web
    name: iot-ingestion-api
    env: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sensor-db
          property: connectionString
      - key: API_KEY
        sync: false